<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Latest News - HANGOUT: Youth Mobility & Urban Innovation. Putting 14–18 year-olds at the centre of sustainable mobility planning.">
    <title>Latest News | HANGOUT Project</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Glassmorphism Navigation -->
    <nav class="glass-nav" id="navbar">
        <div class="nav-container">
            <div class="brand">
                <a href="index.html">
                    <img src="12-logo.png" alt="Hangout Logo"
                        style="height: 100px; max-width: 350px; width: auto; object-fit: contain;">
                </a>
            </div>
            <button class="hamburger" id="hamburger" aria-label="Toggle menu">
                <i class="fa-solid fa-bars"></i>
            </button>
            <ul class="nav-links" id="nav-links">
                <li><a href="index.html#about"><span data-i18n="T_ABOUT"></span></a></li>
                <li><a href="index.html#objectives"><span data-i18n="T_OBJECTIVES"></span></a></li>
                <li><a href="index.html#cities"><span data-i18n="T_CITIES"></span></a></li>
                <li><a href="index.html#workpackages"><span data-i18n="T_WORK_PLAN"></span></a></li>
                <li><a href="index.html#consortium"><span data-i18n="T_CONSORTIUM"></span></a></li>
                <li><a href="news.html" style="color: var(--color-orange); font-weight: 700;"><span
                            data-i18n="T_NEWS"></span></a></li>
                <li class="lang-switcher" style="display: flex; gap: 8px; margin-left: 15px; align-items: center;">
                    <button class="flag-btn" data-lang="pt" title="Português (PT)"
                        onclick="switchLanguage('pt')">🇵🇹</button>
                    <button class="flag-btn" data-lang="es" title="Español" onclick="switchLanguage('es')">🇪🇸</button>
                    <button class="flag-btn" data-lang="nl" title="Nederlands"
                        onclick="switchLanguage('nl')">🇳🇱</button>
                    <button class="flag-btn" data-lang="da" title="Dansk" onclick="switchLanguage('da')">🇩🇰</button>
                    <button class="flag-btn" data-lang="no" title="Norsk" onclick="switchLanguage('no')">🇳🇴</button>
                    <button class="flag-btn active" data-lang="en" title="Reset to English"
                        onclick="switchLanguage('en')" style="font-size: 0.9rem;">🇬🇧</button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Hero Section for News -->
    <section class="hero" id="news-hero" style="min-height: 60vh; padding-top: 180px; align-items: flex-start;">
        <div class="ambient-orb orb-1" style="background: var(--color-orange);"></div>
        <div class="ambient-orb orb-2"
            style="background: var(--color-teal); width: 400px; height: 400px; right: -100px; left: auto;"></div>

        <div class="container text-center"
            style="text-align: center; max-width: 900px; margin: 0 auto; z-index: 10; position:relative;">
            <div class="subtitle text-gradient" style="font-size: 1.5rem; margin-bottom: 0.5rem;"><i
                    class="fa-solid fa-bolt"></i> <span data-i18n="T_BREAKING_GROUND"></span></div>
            <h1 class="headline" style="font-size: 4rem;"><span data-i18n="T_THE_LATEST_FROM"></span><span
                    style="font-style: italic; color: var(--color-navy);"><span data-i18n="T_HANGOUT"></span></span>
            </h1>
            <p class="description" style="margin: 0 auto; margin-top: 1.5rem; font-size: 1.3rem;"
                data-i18n="T_STAY_UPDATED_ON_HOW_WE_ARE_EMP"></p>
        </div>
    </section>

    <!-- News Grid Area -->
    <section class="news-updates" style="padding: 2rem 0 6rem; position: relative; z-index: 10;">
        <div class="container">
            <!-- News Feature Card -->
            <div class="partner-card"
                style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 2.5rem; text-align: left; padding: 2rem; max-width: 1000px; margin: 0 auto 3rem; cursor: default; transform: none; height: auto;">
                <div
                    style="border-radius: 12px; overflow: hidden; background: rgba(0,0,0,0.05); aspect-ratio: 4/3; display: flex; align-items: center; justify-content: center;">
                    <img src="assets/youth_mobility_new.png" alt="Youth Mobility Kickoff"
                        style="width: 100%; height: 100%; object-fit: cover; opacity: 0.9;">
                </div>
                <div style="display: flex; flex-direction: column; justify-content: center;">
                    <span
                        style="display: inline-block; padding: 0.3rem 0.8rem; background: var(--color-orange); color: white; border-radius: 50px; font-size: 0.8rem; font-weight: 700; text-transform: uppercase; margin-bottom: 1rem; width: fit-content;"
                        data-i18n="T_FEATURED"></span>
                    <h3 style="font-family: var(--font-heading); font-size: 2rem; color: var(--color-navy); margin-bottom: 1rem; line-height: 1.2;"
                        data-i18n="T_IN_PERSON_KICK_OFF_MEETING_AT_"></h3>
                    <p style="color: var(--color-text-muted); font-size: 1.1rem; line-height: 1.6; margin-bottom: 1.5rem;"
                        data-i18n="T_THE_HANGOUT_CONSORTIUM_IS_SET_"></p>
                    <div
                        style="display: flex; align-items: center; gap: 1rem; font-size: 0.9rem; font-weight: 600; color: var(--color-teal);">
                        <span><i class="fa-regular fa-calendar" style="margin-right: 0.3rem;"></i> <span
                                data-i18n="T_MAY_12_2026"></span></span>
                        <span><i class="fa-regular fa-clock" style="margin-right: 0.3rem;"></i> <span
                                data-i18n="T_2_MIN_READ"></span></span>
                    </div>
                </div>
            </div>

            <!-- Standard News Grid -->
            <div
                style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; max-width: 1200px; margin: 0 auto;">

                <div class="partner-card"
                    style="cursor: default; transform: none; height: auto; align-items: center; justify-content: center; text-align: center; padding: 4rem 2rem; background: rgba(255, 255, 255, 0.2); border: 2px dashed rgba(11, 19, 43, 0.1); min-height: 300px;">
                    <div style="font-size: 3rem; color: var(--color-text-muted); margin-bottom: 1rem; opacity: 0.5;">
                        <i class="fa-regular fa-newspaper"></i>
                    </div>
                    <h4 style="font-size: 1.25rem; color: var(--color-text-muted); margin-bottom: 0.5rem; line-height: 1.3;"
                        data-i18n="T_MORE_NEWS_COMING_SOON"></h4>
                    <p style="font-size: 0.95rem; color: var(--color-text-muted); opacity: 0.7;"
                        data-i18n="T_CHECK_BACK_LATER_AS_OUR_EVENTS"></p>
                </div>

            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="glass-footer">
        <div class="container">
            <div class="footer-grid">
                <div>
                    <div class="brand">
                        <a href="index.html">
                            <img src="12-logo.png" alt="Hangout Logo"
                                style="height: 100px; width: auto; object-fit: contain;">
                        </a>
                    </div>
                    <p class="footer-note"><span data-i18n="T_UNLOCKING_ADOLESCENTS_URBAN_AC">Unlocking adolescents'
                            urban accessibility and sustainable mobility. DUT
                            Partnership Call 2024, 15-Minute City Pathway. January 2026 – December 2028.</span></p>
                </div>
                <ul class="footer-links">
                    <li><a href="index.html#about"><span data-i18n="T_ABOUT"></span></a></li>
                    <li><a href="index.html#objectives"><span data-i18n="T_OBJECTIVES"></span></a></li>
                    <li><a href="index.html#cities"><span data-i18n="T_CITIES"></span></a></li>
                    <li><a href="index.html#consortium"><span data-i18n="T_TEAM"></span></a></li>
                </ul>
                <div
                    style="display: flex; flex-direction: column; gap: 1rem; align-items: flex-end; justify-content: center;">
                    <img src="DUT.jpg" alt="DUT Logo"
                        style="height: 55px; width: auto; object-fit: contain; mix-blend-mode: multiply;">
                    <img src="EU.png" alt="EU Logo" style="height: 55px; width: auto; object-fit: contain;">
                </div>
            </div>
            <div class="copyright">
                <p>&copy; 2026 HANGOUT: Youth Mobility & Urban Innovation. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="locales/en.js"></script>
    <script src="locales/pt.js"></script>
    <script src="locales/es.js"></script>
    <script src="locales/nl.js"></script>
    <script src="locales/da.js"></script>
    <script src="locales/no.js"></script>
    <script src="i18n.js"></script>
    <style>
        .flag-btn {
            background: none;
            border: 2px solid transparent;
            cursor: pointer;
            font-size: 1.5rem;
            padding: 2px 6px;
            border-radius: 8px;
            transition: all 0.2s ease;
            opacity: 0.7;
        }

        .flag-btn:hover {
            background: rgba(0, 0, 0, 0.05);
            transform: scale(1.1);
            opacity: 0.9;
        }

        .flag-btn.active {
            background: rgba(0, 206, 209, 0.2);
            border: 2px solid var(--color-teal, #00ced1);
            opacity: 1;
        }
    </style>
</body>

</html>
